<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .main-container { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.05); }
        .item-row:hover { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-transparent w-screen h-screen flex items-center justify-center opacity-0 transition-opacity duration-300 pointer-events-none">
    <div class="w-[650px] main-container rounded-2xl overflow-hidden flex flex-col shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <!-- Header -->
        <div class="px-8 py-7 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight leading-none">VEHICLE RENTAL</h1>
                <p class="text-xs text-white/30 uppercase tracking-[0.2em] font-semibold mt-2">Available Vehicles</p>
            </div>
            <button onclick="closeUI()" class="text-white/20 hover:text-white transition-colors mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="h-[1px] w-full bg-white/5"></div>

        <!-- Content -->
        <div id="vehicle-list" class="max-h-[400px] overflow-y-auto py-2">
            <!-- Items injected via JS -->
        </div>

        <!-- Footer -->
        <div class="px-8 py-4 border-t border-white/5 flex justify-between items-center bg-black/20">
            <span class="text-[10px] text-white/20 uppercase tracking-widest font-bold">Press ESC to exit</span>
            <span class="text-[10px] text-white/40 uppercase tracking-widest font-bold">Select a vehicle to rent</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
